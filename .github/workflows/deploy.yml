name: CI/CD Deployment Pipeline (B2B Dashboard)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Dashboard to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NEW_EC2_HOST }}
          username: ${{ secrets.NEW_EC2_USER }}
          key: ${{ secrets.NEW_EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 20m
          script_stop: true

          script: |
            set -e

            echo "Connected to EC2"

            cd /home/ubuntu/b2bdashbaord

            git fetch origin
            git reset --hard origin/main

            docker compose -p b2bdashboard -f docker-compose.prod.yml down

            docker compose -p b2bdashboard -f docker-compose.prod.yml up -d --build

            docker image prune -f

            echo "Deployment completed."
