server {
    listen 80;
    server_name business.otoddy.com;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml+rss
        application/xml
        image/svg+xml;
}
